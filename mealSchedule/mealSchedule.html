<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식단표</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="mealSchedule.css">
</head>
<body class="bg-light">
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-nav">
                <div class="nav-item">
                    <a href="../index.html" class="nav-link active">대시보드</a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link">업무</a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link">비업무</a>
                </div>

                <div class="mega-menu">
                    <div class="mega-menu-container">
                        <div class="mega-menu-column">
                            <a href="../index.html" class="mega-menu-item">대시보드</a>
                        </div>
                        <div class="mega-menu-column">
                            <a href="../shipDB/identified/identified.html" class="mega-menu-item">식별 선박 DB</a>
                            <a href="../shipDB/unidentified/unidentified.html" class="mega-menu-item">미식별 선박 DB</a>
                            <a href="../shipTrace/shipTrace.html" class="mega-menu-item">선박 추적</a>
                        </div>
                        <div class="mega-menu-column">
                            <a href="../personnelMattersInformation/personnelMattersInformation.html" class="mega-menu-item">인사 정보</a>
                            <a href="../game/game.html" class="mega-menu-item game-link">놀이터</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="navbar-right">
                <div id="clock" class="clock"></div>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <section class="content-section">
            <div class="section-header">
                <h2 class="section-title">식단 관리</h2>
                <div class="header-actions">
                    <button id="btn-add-meal" class="btn btn-primary btn-sm">식단 추가/수정</button>
                    <div class="week-selector">
                        <button id="prev-week" class="btn btn-secondary btn-sm"><</button>
                        <input type="date" id="week-picker" class="form-control-sm">
                        <button id="next-week" class="btn btn-secondary btn-sm">></button>
                    </div>
                </div>
            </div>
            <div class="section-body">
                <div id="weekly-meal-display" class="table-responsive">
                    <div class="text-center py-5 text-muted">데이터를 로딩 중...</div>
                </div>
            </div>
        </section>
    </main>

    <!-- 식단 추가/수정 모달 -->
    <div id="meal-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>식단 추가/수정</h3>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <form id="meal-form">
                    <div class="form-group mb-3">
                        <label for="meal-date">날짜</label>
                        <input type="date" id="meal-date" class="form-control" required>
                    </div>
                    <div class="form-group mb-3">
                        <label for="meal-brunch">브런치 (일요일 전용)</label>
                        <textarea id="meal-brunch" class="form-control" rows="2" placeholder="일요일인 경우에만 입력하세요."></textarea>
                    </div>
                    <div class="form-group mb-3">
                        <label for="meal-breakfast">아침</label>
                        <textarea id="meal-breakfast" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="form-group mb-3">
                        <label for="meal-lunch">점심</label>
                        <textarea id="meal-lunch" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="form-group mb-3">
                        <label for="meal-dinner">저녁</label>
                        <textarea id="meal-dinner" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="form-actions text-right">
                        <button type="button" id="btn-delete-meal" class="btn btn-danger">삭제</button>
                        <button type="submit" class="btn btn-primary">저장</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container text-center">
            <div class="footer-links">
                <a href="../databaseManager/databaseManager.html" target="_blank">DBM 관리</a>
                <span class="sep">|</span>
                <a href="#">국방인사정보체계</a>
                <span class="sep">|</span>
                <a href="#">제96보병여단</a>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script src="mealSchedule.js"></script>
</body>
</html>
