<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인사 정보</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="personnelMattersInformation.css">
</head>
<body class="bg-light">
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-nav">
                <a href="../index.html" class="nav-link">대시보드</a>
                <a href="personnelMattersInformation.html" class="nav-link active">인사 정보</a>
                <div class="nav-item-dropdown">
                    <a href="#" class="nav-link">선박 DB</a>
                    <div class="dropdown-menu">
                        <a href="../shipDB/identified/identified.html" class="dropdown-item">식별 선박</a>
                        <a href="../shipDB/unidentified/unidentified.html" class="dropdown-item">미식별 선박</a>
                    </div>
                </div>
                <a href="../shipTrace/shipTrace.html" class="nav-link">선박 추적</a>
            </div>
            <div class="navbar-right">
                <div id="clock" class="clock"></div>
                <a href="../game/game.html" class="nav-link game-link">놀이터</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="profile-layout">
            <section class="card shadow-sm mb-4">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="card-title mb-0">인사 정보 상세</h5>
                    <div class="selector-wrapper">
                        <select id="memberSelect" class="form-select">
                            <option value="">인원을 선택하세요</option>
                        </select>
                    </div>
                </div>
                <div class="card-body">
                    <div id="resultDisplay" class="result-content hidden">
                        <div class="d-flex justify-content-start mb-3">
                            <button id="backToList" class="btn-outline">
                                <i class="fas fa-arrow-left mr-2"></i>목록으로 돌아가기
                            </button>
                        </div>
                        <div class="profile-header text-center mb-5">
                            <div class="profile-photo-container">
                                <img id="resPhoto" src="../img/default-profile.png" alt="Profile Photo" class="profile-photo shadow-lg">
                                <div id="resRankTop" class="rank-badge-overlay"></div>
                            </div>
                            <div class="profile-basic-info mt-4">
                                <h2 id="resName" class="display-name mb-1"></h2>
                                <p id="resNickName" class="nickname text-muted"></p>
                                
                                <div class="progress-section mt-4 mx-auto" style="max-width: 500px;">
                                    <div class="d-flex justify-content-between mb-2">
                                        <span class="text-sm font-weight-bold">복무 진행률</span>
                                        <span id="resPercent" class="realtime-percent text-primary"></span>
                                    </div>
                                    <div class="progress-bar-container shadow-sm">
                                        <div id="progressBarFill" class="progress-bar-fill"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="info-sections-grid">
                            <div class="info-group">
                                <h6 class="group-title"><i class="fas fa-user-circle mr-2"></i>기본 신상 정보</h6>
                                <div class="info-cards-container">
                                    <div class="info-item-card">
                                        <i class="fas fa-building text-primary"></i>
                                        <div class="info-text">
                                            <label>소속</label>
                                            <span id="resAffiliation"></span>
                                        </div>
                                    </div>
                                    <div class="info-item-card">
                                        <i class="fas fa-briefcase text-primary"></i>
                                        <div class="info-text">
                                            <label>보직</label>
                                            <span id="resPosition"></span>
                                        </div>
                                    </div>
                                    <div class="info-item-card">
                                        <i class="fas fa-palette text-primary"></i>
                                        <div class="info-text">
                                            <label>취미</label>
                                            <span id="resHobby"></span>
                                        </div>
                                    </div>
                                    <div class="info-item-card">
                                        <i class="fas fa-star text-primary"></i>
                                        <div class="info-text">
                                            <label>특기</label>
                                            <span id="resSpecialty"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="info-group">
                                <h6 class="group-title"><i class="fas fa-calendar-alt mr-2"></i>복무 및 주요 일정</h6>
                                <div class="info-cards-container">
                                    <div class="info-item-card highlight">
                                        <i class="fas fa-shield-alt text-success"></i>
                                        <div class="info-text">
                                            <label>현재 상태</label>
                                            <span id="resRankStatus" class="font-weight-bold"></span>
                                        </div>
                                    </div>
                                    <div class="info-item-card">
                                        <i class="fas fa-clock text-info"></i>
                                        <div class="info-text">
                                            <label>복무 기간</label>
                                            <span id="resServicePeriod" class="text-sm"></span>
                                        </div>
                                    </div>
                                    <div class="info-item-card highlight-danger">
                                        <i class="fas fa-flag-checkered text-danger"></i>
                                        <div class="info-text">
                                            <label>전역일</label>
                                            <span id="resDday" class="font-weight-bold"></span>
                                        </div>
                                    </div>
                                    <div class="info-item-card">
                                        <i class="fas fa-arrow-up text-warning"></i>
                                        <div class="info-text">
                                            <label>진급 예정</label>
                                            <span id="resPromoInfo"></span>
                                        </div>
                                    </div>
                                    <div class="info-item-card">
                                        <i class="fas fa-plane-departure text-info"></i>
                                        <div class="info-text">
                                            <label>휴가 예정</label>
                                            <span id="resVacInfo"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="noDataMessage" class="text-center py-5 text-muted">
                        <i class="fas fa-id-card fa-4x mb-3 opacity-20"></i>
                        <p class="lead">인원을 선택하면 상세 프로필이 표시됩니다.</p>
                    </div>
                </div>
            </section>

            <div id="previewDisplay" class="preview-grid"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <div class="footer-links">
                <a href="../databaseManager/databaseManager.html" target="_blank">DBM</a>
                <span class="sep">|</span>
                <a href="#">국방인사정보체계</a>
                <span class="sep">|</span>
                <a href="#">제96보병여단</a>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script src="personnelMattersInformation.js"></script>
</body>
</html>
