<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>복무 정보 조회</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="milCalc.css">
</head>
<body class="bg-light">
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-nav">
                <a href="../index.html" class="nav-link">대시보드</a>
                <a href="milCalc.html" class="nav-link active">복무 정보</a>
                <div class="nav-item-dropdown">
                    <a href="#" class="nav-link">선박 DB</a>
                    <div class="dropdown-menu">
                        <a href="../shipDB/received/received.html" class="dropdown-item">수신 선박</a>
                        <a href="../shipDB/identified/identified.html" class="dropdown-item">식별 선박</a>
                        <a href="../shipDB/unidentified/unidentified.html" class="dropdown-item">미식별 선박</a>
                    </div>
                </div>
                <a href="../shipTrace/shipTrace.html" class="nav-link">선박 추적</a>
            </div>
            <div class="navbar-right">
                <div id="clock" class="clock"></div>
                <a href="../game/game.html" class="nav-link game-link">놀이터</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="calculator-layout">
            <section class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <h5 class="card-title">복무 정보 조회</h5>
                </div>
                <div class="card-body">
                    <div class="selector-section mb-4">
                        <select id="memberSelect" class="form-select">
                            <option value="">이름을 선택하세요</option>
                        </select>
                    </div>

                    <div id="resultDisplay" class="result-content hidden">
                        <div class="result-header text-center mb-4">
                            <div class="realtime-percent-container">
                                <h2 id="resName" class="display-name mb-0"></h2>
                                <span id="resPercent" class="realtime-percent"></span>
                            </div>
                            <div class="progress-bar-container mt-3">
                                <div id="progressBarFill" class="progress-bar-fill"></div>
                            </div>
                        </div>

                        <table class="info-table table table-bordered">
                            <thead>
                                <tr><th colspan="2">기본 정보</th></tr>
                            </thead>
                            <tbody>
                                <tr><td class="table-label">현재 계급</td><td><span id="resRank" class="font-weight-bold"></span></td></tr>
                                <tr><td class="table-label">입대일</td><td><span id="resStartDate"></span></td></tr>
                                <tr><td class="table-label">전역일</td><td><span id="resEndDate"></span></td></tr>
                                <tr><td class="table-label">남은 기간</td><td><span id="resDday" class="text-primary font-weight-bold"></span></td></tr>
                            </tbody>
                            <thead>
                                <tr><th colspan="2">진급 및 휴가</th></tr>
                            </thead>
                            <tbody>
                                <tr><td class="table-label">진급 예정일</td><td><span id="resNextPromo"></span></td></tr>
                                <tr><td class="table-label">진급까지</td><td><span id="resPromoDday" class="text-danger"></span></td></tr>
                                <tr><td class="table-label">휴가 예정일</td><td><span id="resNextVac"></span></td></tr>
                                <tr><td class="table-label">휴가까지</td><td><span id="resVacDday" class="text-danger"></span></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <div id="previewDisplay" class="preview-grid"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <div class="footer-links">
                <a href="../databaseManager/databaseManager.html" target="_blank">DBM 관리</a>
                <span class="sep">|</span>
                <a href="#">국방인사정보체계</a>
                <span class="sep">|</span>
                <a href="#">제96보병여단</a>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script src="milCalc.js"></script>
</body>
</html>
