<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="workSchedule.css">
</head>
<body class="bg-light">
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-nav">
                <div class="nav-item">
                    <a href="../index.html" class="nav-link active">대시보드</a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link">업무</a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link">비업무</a>
                </div>

                <div class="mega-menu">
                    <div class="mega-menu-container">
                        <div class="mega-menu-column">
                            <a href="../index.html" class="mega-menu-item">대시보드</a>
                        </div>
                        <div class="mega-menu-column">
                            <a href="../shipDB/identified/identified.html" class="mega-menu-item">식별 선박 DB</a>
                            <a href="../shipDB/unidentified/unidentified.html" class="mega-menu-item">미식별 선박 DB</a>
                            <a href="../shipTrace/shipTrace.html" class="mega-menu-item">선박 추적</a>
                        </div>
                        <div class="mega-menu-column">
                            <a href="../personnelMattersInformation/personnelMattersInformation.html" class="mega-menu-item">인사 정보</a>
                            <a href="../game/game.html" class="mega-menu-item game-link">놀이터</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="navbar-right">
                <div id="clock" class="clock"></div>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <section class="content-section">
            <div class="section-header">
                <h2 class="section-title" id="month-title">근무표</h2>
                <div class="header-actions" style="display: flex; align-items: center; gap: 10px;">
                    <button id="btn-add-work" class="btn btn-primary btn-sm">근무 추가/수정</button>
                    <div class="month-selector">
                        <input type="month" id="month-picker" class="form-control" style="padding: 8px 12px; border-radius: 6px; border: 1px solid #ddd; font-family: inherit;">
                    </div>
                </div>
            </div>
            <div class="section-body">
                <div id="monthly-work-display" class="table-responsive">
                    <div class="text-center py-5 text-muted">데이터를 로딩 실패</div>
                </div>
            </div>
        </section>

        <!-- 근무 추가/수정 모달 -->
        <div id="work-modal" class="modal hidden">
            <div class="modal-content" style="max-width: 600px;">
                <div class="modal-header">
                    <h3>근무 추가/수정</h3>
                    <span class="close-modal">&times;</span>
                </div>
                <div class="modal-body">
                    <form id="work-form">
                        <div class="form-group mb-3">
                            <label for="work-date">날짜</label>
                            <input type="date" id="work-date" class="form-control" required>
                        </div>
                        <div class="form-group mb-3">
                            <label><input type="checkbox" id="work-is-holiday"> 휴일 여부</label>
                        </div>
                        
                        <div class="row">
                            <div class="col-6">
                                <h5>항포구 (CCTV)</h5>
                                <div class="mb-2">
                                    <label>06-14 (사수/부사수)</label>
                                    <div style="display: flex; gap: 5px;">
                                        <input type="text" id="cctv-0-p1" class="form-control" placeholder="사수">
                                        <input type="text" id="cctv-0-p2" class="form-control" placeholder="부사수">
                                    </div>
                                </div>
                                <div class="mb-2">
                                    <label>14-22 (사수/부사수)</label>
                                    <div style="display: flex; gap: 5px;">
                                        <input type="text" id="cctv-1-p1" class="form-control" placeholder="사수">
                                        <input type="text" id="cctv-1-p2" class="form-control" placeholder="부사수">
                                    </div>
                                </div>
                                <div class="mb-2">
                                    <label>22-06 (사수/부사수)</label>
                                    <div style="display: flex; gap: 5px;">
                                        <input type="text" id="cctv-2-p1" class="form-control" placeholder="사수">
                                        <input type="text" id="cctv-2-p2" class="form-control" placeholder="부사수">
                                    </div>
                                </div>
                            </div>
                            <div class="col-6">
                                <h5>TOD</h5>
                                <div class="mb-2">
                                    <label>고하도 (사수/부사수)</label>
                                    <div style="display: flex; gap: 5px;">
                                        <input type="text" id="tod-0-p1" class="form-control" placeholder="사수">
                                        <input type="text" id="tod-0-p2" class="form-control" placeholder="부사수">
                                    </div>
                                </div>
                                <div class="mb-2">
                                    <label>외기 평시 (사수/부사수)</label>
                                    <div style="display: flex; gap: 5px;">
                                        <input type="text" id="tod-1-p1" class="form-control" placeholder="사수">
                                        <input type="text" id="tod-1-p2" class="form-control" placeholder="부사수">
                                    </div>
                                </div>
                                <div class="mb-2">
                                    <label>외기 핵취 (사수/부사수)</label>
                                    <div style="display: flex; gap: 5px;">
                                        <input type="text" id="tod-2-p1" class="form-control" placeholder="사수">
                                        <input type="text" id="tod-2-p2" class="form-control" placeholder="부사수">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="form-actions text-right mt-3">
                            <button type="button" id="btn-delete-work" class="btn btn-danger">삭제</button>
                            <button type="submit" class="btn btn-primary">저장</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <section class="content-section">
            <div class="section-header">
                <h2 class="section-title">통계</h2>
            </div>
            <div class="section-body">
                <div id="stats-display">
                    <div class="text-center py-5 text-muted">데이터 로딩 실패</div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <div class="footer-links">
                <a href="../databaseManager/databaseManager.html" target="_blank">DBM 관리</a>
                <span class="sep">|</span>
                <a href="#">국방인사정보체계</a>
                <span class="sep">|</span>
                <a href="#">제96보병여단</a>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script src="workSchedule.js"></script>
</body>
</html>
